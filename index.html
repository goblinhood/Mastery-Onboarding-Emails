        </div>

        <div class="spec-row"><div class="spec-label">Trigger</div><div class="spec-value">${e.trigger}</div></div>
        <div class="spec-row"><div class="spec-label">Purpose</div><div class="spec-value">${e.purpose}</div></div>
        <div class="spec-row"><div class="spec-label">Audience</div><div class="spec-value">${e.audience}</div></div>
        <div class="spec-divider"></div>
        <div class="spec-row"><div class="spec-label">Replaces</div><div class="spec-value"><strong>${e.replaces}</strong></div></div>

        <div class="metric-grid">${metricsHTML}</div>
      </div>
    </div>
    <div class="email-preview-wrap">
      <div class="email-chrome">
        <div class="email-toolbar">
          <div class="dots"><span></span><span></span><span></span></div>
          <div class="from-line"><strong>Mindvalley</strong> &lt;hello@mindvalley.com&gt;</div>
        </div>
        <div class="email-body">${e.body}</div>
      </div>
    </div>
  `;
  main.appendChild(view);
});

function switchEmail(idx) {
  document.querySelectorAll('.pill').forEach((p, i) => p.classList.toggle('active', i === idx));
  document.querySelectorAll('.email-view').forEach((v, i) => v.classList.toggle('active', i === idx));
}
</script>
</body>
</html>
